name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "packages/database/**"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pos_app
          POSTGRES_PASSWORD: pos_secret
          POSTGRES_DB: pos_saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pos_app:pos_secret@localhost:5432/pos_saas
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pos/database db:generate
      - run: pnpm db:migrate
      - run: pnpm --filter @pos/api build
