services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pos_app
      POSTGRES_PASSWORD: pos_secret
      POSTGRES_DB: pos_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_app -d pos_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
